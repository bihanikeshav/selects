name: Release builds

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}  # allow manual runs from the Actions tab

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: selects-windows-x64
          - os: macos-latest
            artifact: selects-macos-arm64
          - os: ubuntu-latest
            artifact: selects-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Linux webview (GTK/WebKit) system deps
        if: runner.os == 'Linux'
        # pywebview's Linux backend is WebKitGTK via PyGObject. Best-effort: the
        # webkit apt package name varies across Ubuntu releases (4.1 / 4.0 /
        # webkit-6.0), and the app cleanly falls back to a browser window if the
        # native backend is missing — so never fail the whole build here.
        continue-on-error: true
        run: |
          sudo apt-get update || true
          sudo apt-get install -y libgirepository1.0-dev gir1.2-gtk-3.0 libcairo2-dev || true
          sudo apt-get install -y gir1.2-webkit2-4.1 \
            || sudo apt-get install -y gir1.2-webkit2-4.0 \
            || sudo apt-get install -y gir1.2-webkit-6.0 || true
          pip install pygobject pycairo || true
      - name: Install package (CPU torch) + ML stack + PyInstaller
        run: |
          # CPU torch first (much smaller than the CUDA wheels); the [ml] extra
          # then reuses it (torch>=2.2 already satisfied) and adds transformers/
          # insightface/onnxruntime/sklearn/hdbscan/umap so the bundle can ship
          # working AI instead of ImportError-ing on first use.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install ".[ml]" pyinstaller  # non-editable: avoids PEP 660 editable-hook issues
      - name: Fetch darktable for bundling (Windows)
        if: runner.os == 'Windows'
        # Silent-installs darktable into vendor/darktable (Inno Setup, no extra
        # tooling); selects.spec bundles it so "Edit in darktable" works with no
        # separate install. Non-fatal: a failure just means the released build
        # falls back to a system darktable install.
        continue-on-error: true
        run: python packaging/fetch_darktable.py
      - name: Build bundle (with ML stack)
        run: python packaging/build.py --ml
      - name: Zip bundle
        shell: bash
        run: |
          cd dist
          if [ "$RUNNER_OS" = "Windows" ]; then
            7z a ../${{ matrix.artifact }}.zip selects
          else
            zip -qr ../${{ matrix.artifact }}.zip selects
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  pypi-publish:
    # Skip PyPI for pre-release / test tags (anything with a hyphen, e.g.
    # v0.1.9-test) and for manual workflow_dispatch runs — those are for
    # producing GitHub test builds without burning a PyPI version.
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC token for PyPI Trusted Publishing — no API token needed
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build frontend into packaged static dir
        run: |
          npm --prefix frontend ci
          npm --prefix frontend run build
          rm -rf selects/server/static
          cp -r frontend/dist selects/server/static
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true  # don't fail if this version is already on PyPI

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create GitHub release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true
          draft: false  # publish immediately, not as a draft
          prerelease: ${{ contains(github.ref_name, '-') }}  # -test/-rc tags = prerelease
