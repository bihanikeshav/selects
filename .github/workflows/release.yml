name: Release builds

on:
  push:
    tags: ["v*"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: travelcull-windows-x64
          - os: macos-latest
            artifact: travelcull-macos-arm64
          - os: ubuntu-latest
            artifact: travelcull-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install package (CPU torch) + PyInstaller
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e . pyinstaller
      - name: Build bundle
        run: python packaging/build.py
      - name: Zip bundle
        shell: bash
        run: |
          cd dist
          if [ "$RUNNER_OS" = "Windows" ]; then
            7z a ../${{ matrix.artifact }}.zip travelcull
          else
            zip -qr ../${{ matrix.artifact }}.zip travelcull
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create GitHub release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true
          draft: true
