name: Release builds

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}  # allow manual runs from the Actions tab

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: selects-windows-x64
          - os: macos-latest
            artifact: selects-macos-arm64
          - os: ubuntu-latest
            artifact: selects-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install package (CPU torch) + ML stack + PyInstaller
        run: |
          # CPU torch first (much smaller than the CUDA wheels); the [ml] extra
          # then reuses it (torch>=2.2 already satisfied) and adds transformers/
          # insightface/onnxruntime/sklearn/hdbscan/umap so the bundle can ship
          # working AI instead of ImportError-ing on first use.
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install ".[ml]" pyinstaller  # non-editable: avoids PEP 660 editable-hook issues
      - name: Build bundle (with ML stack)
        run: python packaging/build.py --ml
      - name: Zip bundle
        shell: bash
        run: |
          cd dist
          if [ "$RUNNER_OS" = "Windows" ]; then
            7z a ../${{ matrix.artifact }}.zip selects
          else
            zip -qr ../${{ matrix.artifact }}.zip selects
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  pypi-publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # OIDC token for PyPI Trusted Publishing — no API token needed
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build frontend into packaged static dir
        run: |
          npm --prefix frontend ci
          npm --prefix frontend run build
          rm -rf selects/server/static
          cp -r frontend/dist selects/server/static
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true  # don't fail if this version is already on PyPI

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create GitHub release with artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: "*.zip"
          generate_release_notes: true
          draft: true
